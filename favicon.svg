<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="#13103a"/>

  <!-- Circular bead chain (12 beads arranged in a circle) -->
  <!-- Center of circle: 32,33; radius: 18 -->
  <circle cx="32"   cy="15"   r="3.2" fill="#a78bfa"/>
  <circle cx="41"   cy="17.4" r="3.2" fill="#a78bfa"/>
  <circle cx="48"   cy="24"   r="3.2" fill="#a78bfa"/>
  <circle cx="50"   cy="33"   r="3.2" fill="#a78bfa"/>
  <circle cx="48"   cy="42"   r="3.2" fill="#a78bfa"/>
  <circle cx="41"   cy="48.6" r="3.2" fill="#a78bfa"/>
  <circle cx="32"   cy="51"   r="3.2" fill="#a78bfa"/>
  <circle cx="23"   cy="48.6" r="3.2" fill="#a78bfa"/>
  <circle cx="16"   cy="42"   r="3.2" fill="#a78bfa"/>
  <circle cx="14"   cy="33"   r="3.2" fill="#a78bfa"/>
  <circle cx="16"   cy="24"   r="3.2" fill="#a78bfa"/>
  <circle cx="23"   cy="17.4" r="3.2" fill="#a78bfa"/>

  <!-- Connector ring drawn as a thin arc outline at the top -->
  <circle cx="32" cy="33" r="18" fill="none" stroke="#7c5cbf" stroke-width="1.4" stroke-dasharray="0"/>

  <!-- Separator / imam bead (teardrop shape at top) -->
  <ellipse cx="32" cy="8" rx="4" ry="5.5" fill="#f6d860"/>
  <!-- Small connector line from separator to chain -->
  <line x1="32" y1="13" x2="32" y2="15" stroke="#c9a227" stroke-width="1.5" stroke-linecap="round"/>
</svg>
